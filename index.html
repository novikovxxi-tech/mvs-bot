<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>МВС СТ АУК №1</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0f1318" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="МВС АУК" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<style>
  :root {
    --bg: #0f1318;
    --bg-card: #1a2030;
    --bg-input: #141b27;
    --border: #2a3548;
    --accent: #3f8cff;
    --accent2: #5ad17a;
    --text: #eef2f8;
    --text-dim: #8b95a7;
    --red: #ff5a5a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Inter', sans-serif; min-height: 100dvh; }

  /* ── Header ── */
  .header {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 12px;
    display: flex; align-items: center; gap: 10px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-title { font-size: 16px; font-weight: 700; }
  .back-btn {
    background: none; border: none; color: var(--accent);
    font-size: 28px; cursor: pointer; padding: 0 4px;
    line-height: 1;
  }

  /* ── Content area ── */
  .content {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 600px;
    margin: 0 auto;
  }

  /* ── Cards ── */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
  }
  .card-title { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
  .card-sub { font-size: 13px; color: var(--text-dim); }

  /* ── Buttons ── */
  .btn-group { display: flex; flex-direction: column; gap: 8px; }
  .btn-group-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .btn {
    padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--bg-card); color: var(--text); font-size: 14px;
    font-weight: 600; cursor: pointer; font-family: inherit;
    transition: all .15s; text-align: center;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn:active { opacity: .8; transform: scale(.98); }
  .btn.primary { background: var(--accent); border-color: transparent; color: #fff; }
  .btn.back { color: var(--accent); background: rgba(63,140,255,.08); border-color: rgba(63,140,255,.2); }
  .btn.ghost { color: var(--text-dim); }
  .btn.big { min-height: 72px; flex-direction: column; font-size: 15px; gap: 4px; }
  .btn.big .sub { font-size: 12px; color: var(--text-dim); font-weight: 400; }
  .btn.primary .sub { color: rgba(255,255,255,.7); }

  /* ── Form fields ── */
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; color: var(--text-dim); font-weight: 600; letter-spacing: .3px; }
  .field input, .field select {
    background: var(--bg-input); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; color: var(--text);
    font-size: 15px; font-family: inherit; outline: none;
    width: 100%;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field select { appearance: none; -webkit-appearance: none; }
  .field input::placeholder { color: var(--text-dim); }
  input[type="date"] { color: var(--text); -webkit-appearance: none; }
  .row-2 { display: grid; grid-template-columns: 1.2fr 1fr; gap: 8px; }

  /* ── Status dots & pills ── */
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.ok     { background: #34c759; box-shadow: 0 0 8px rgba(52,199,89,.5); }
  .dot.busy   { background: var(--red); box-shadow: 0 0 8px rgba(255,90,90,.5); }
  .dot.repair { background: #ffb020; box-shadow: 0 0 8px rgba(255,176,32,.5); }
  .dot.new    { background: var(--accent); }

  .pill {
    font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 8px;
    display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
  }
  .pill.ok     { background: rgba(52,199,89,.14); color: #5ad17a; }
  .pill.busy   { background: rgba(255,90,90,.15);  color: #ff7985; }
  .pill.repair { background: rgba(255,176,32,.15); color: #ffc65c; }
  .pill.new    { background: rgba(63,140,255,.15); color: #7ab9ff; }
  .pill.work   { background: rgba(255,176,32,.15); color: #ffc65c; }
  .pill.done   { background: rgba(52,199,89,.14);  color: #5ad17a; }
  .pill.rej    { background: rgba(255,90,90,.15);  color: #ff7985; }

  /* ── Tech pick item ── */
  .tech-pick-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: rgba(255,255,255,.03);
    border-radius: 10px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all .15s;
  }
  .tech-pick-item.selected {
    background: rgba(63,140,255,.12);
    border-color: rgba(63,140,255,.35);
  }
  .pick-check {
    width: 20px; height: 20px; border-radius: 6px;
    border: 2px solid #3a4557;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0; transition: all .15s;
    color: #fff;
  }
  .tech-pick-item.selected .pick-check {
    background: var(--accent); border-color: var(--accent);
  }
  .tech-qty-input, .tech-time-input {
    background: var(--bg-input); border: 1px solid #3a4557;
    border-radius: 8px; color: var(--text); font-family: inherit;
    padding: 4px 6px; outline: none;
  }
  .tech-qty-input { width: 52px; font-size: 13px; text-align: center; }
  .tech-time-input { width: 90px; font-size: 12px; }

  /* ── Request list item ── */
  .req-item {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px 14px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .req-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .req-title { font-size: 14px; font-weight: 600; }
  .req-meta { font-size: 12px; color: var(--text-dim); display: flex; gap: 8px; flex-wrap: wrap; }

  /* ── Succ card ── */
  .succ-card {
    background: linear-gradient(135deg, rgba(52,199,89,.08), rgba(52,199,89,.03));
    border: 1px solid rgba(52,199,89,.25);
    border-radius: 16px;
    padding: 16px;
    font-size: 13.5px;
    line-height: 1.6;
  }
  .succ-card-head {
    display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
  }
  .succ-card-head .title { font-weight: 700; font-size: 14px; color: #d2f7dd; }
  .succ-section { border-top: 1px solid rgba(255,255,255,.06); padding-top: 8px; margin-top: 8px; }
  .succ-section-label { font-size: 13px; font-weight: 700; color: var(--text-dim); margin-bottom: 3px; }
  .succ-section-val { color: var(--text); font-size: 13.5px; }
  .succ-section-sub { color: var(--text-dim); font-size: 13px; }

  /* ── Site autocomplete ── */
  .site-ac-wrap { position: relative; }
  .site-ac-drop {
    position: absolute; left: 0; right: 0; top: calc(100% + 4px);
    background: var(--bg-card); border: 1.5px solid var(--border);
    border-radius: 14px; z-index: 300;
    max-height: 240px; overflow-y: auto;
    box-shadow: 0 8px 28px rgba(0,0,0,.45);
    display: none;
  }
  .site-ac-drop.open { display: block; }
  .site-ac-item {
    padding: 12px 16px; font-size: 14px; cursor: pointer;
    border-bottom: 1px solid var(--border); line-height: 1.35; transition: background .1s;
  }
  .site-ac-item:last-child { border-bottom: none; }
  .site-ac-item.hov, .site-ac-item:active { background: rgba(63,140,255,.12); color: var(--accent); }
  .site-ac-item mark { background: none; color: var(--accent); font-weight: 700; }

  /* ── Dropdown ── */
  .dropdown-list {
    display: none;
    position: absolute; left: 0; right: 0; top: calc(100% + 4px);
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; z-index: 99;
    box-shadow: 0 8px 24px rgba(0,0,0,.35);
    max-height: 220px; overflow-y: auto;
  }
  .dropdown-option {
    padding: 12px 14px; font-size: 13.5px; color: var(--text);
    cursor: pointer; border-bottom: 1px solid rgba(255,255,255,.04);
    transition: background .12s;
  }
  .dropdown-option:last-child { border-bottom: none; }
  .dropdown-option:hover { background: rgba(63,140,255,.1); }
  .dropdown-option .opt-sub { font-size: 11.5px; color: var(--text-dim); margin-top: 2px; }
  .field-wrap { position: relative; }
  .field-arrow {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    color: var(--text-dim); cursor: pointer; font-size: 11px; pointer-events: none;
  }

  /* ── Info note ── */
  .info-note {
    padding: 10px 14px;
    background: rgba(255,255,255,.03);
    border-radius: 10px;
    border-left: 3px solid var(--accent);
    font-size: 12.5px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  /* ── Copy / send button ── */
  .send-btn {
    margin-top: 12px; width: 100%; padding: 10px;
    background: rgba(63,140,255,.12); border: 1px solid rgba(63,140,255,.3);
    border-radius: 10px; color: var(--accent); font-size: 13.5px;
    font-family: inherit; cursor: pointer; transition: background .15s;
  }
  .send-btn:active { background: rgba(63,140,255,.2); }

  /* ── Utility ── */
  .hidden { display: none !important; }
  .caption { font-size: 13px; color: var(--text-dim); }

  /* ── Password screen ── */
  #pw-screen {
    position: fixed; inset: 0; background: #0f1118;
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  #pw-screen.hidden { display: none; }
  .pw-card {
    background: #1a1f2e; border: 1px solid rgba(255,255,255,.08);
    border-radius: 18px; padding: 32px 28px; width: 90%; max-width: 340px;
    display: flex; flex-direction: column; gap: 18px; align-items: center;
  }
  .pw-logo { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -0.5px; text-align: center; }
  .pw-sub { font-size: 13px; color: rgba(255,255,255,.45); text-align: center; }
  .pw-input {
    width: 100%; padding: 13px 16px; border-radius: 10px;
    background: rgba(255,255,255,.06); border: 1.5px solid rgba(255,255,255,.12);
    color: #fff; font-size: 16px; text-align: center;
    letter-spacing: 3px; outline: none;
  }
  .pw-input:focus { border-color: #6366f1; }
  .pw-input.error { border-color: #ef4444; animation: pw-shake .3s; }
  .pw-btn {
    width: 100%; padding: 13px; border-radius: 10px;
    background: #6366f1; color: #fff; font-size: 15px;
    font-weight: 700; border: none; cursor: pointer;
  }
  .pw-err { font-size: 13px; color: #ef4444; min-height: 18px; }
  @keyframes pw-shake {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
  }

  @media (max-width: 480px) {
    .field input, .field select { font-size: 16px; }
    .tech-qty-input { font-size: 16px !important; width: 58px !important; }
    .tech-time-input { font-size: 15px !important; width: 100px !important; }
  }
</style>
</head>
<body>

<!-- ЭКРАН ПАРОЛЯ -->
<div id="pw-screen">
  <div class="pw-card">
    <div class="pw-logo">МВС СТ АУК №1</div>
    <div class="pw-sub">Введите пароль для доступа</div>
    <input class="pw-input" id="pw-input" type="password" placeholder="••••••••"
      onkeydown="if(event.key==='Enter')checkPw()" autocomplete="current-password">
    <div class="pw-err" id="pw-err"></div>
    <button class="pw-btn" onclick="checkPw()">Войти</button>
  </div>
</div>
<script>
  (function(){
    var PW = 'mvs2026';
    var KEY = 'mvs_auth';
    if(localStorage.getItem(KEY) === PW){
      document.getElementById('pw-screen').classList.add('hidden');
    }
    window.checkPw = function(){
      var inp = document.getElementById('pw-input');
      var err = document.getElementById('pw-err');
      if(inp.value === PW){
        localStorage.setItem(KEY, PW);
        document.getElementById('pw-screen').classList.add('hidden');
      } else {
        err.textContent = 'Неверный пароль';
        inp.classList.add('error');
        setTimeout(function(){ inp.classList.remove('error'); }, 400);
        inp.value = '';
      }
    };
  })();
</script>

<!-- HEADER -->
<div class="header">
  <button class="back-btn" id="navBack" style="visibility:hidden">‹</button>
  <div class="header-title">МВС СТ АУК №1</div>
</div>

<!-- CONTENT -->
<div class="content" id="chat">
  <!-- экраны рендерятся сюда -->
</div>

<script>
/* ==================== Data ==================== */
const equipment = [
  { id: 'eks-01', name: 'Экскаватор Komatsu PC200', type: 'Гусеничный экскаватор', icon: '🚜', status: 'ok',     owner: 'Иванов А. В.',      site: 'Объект №4 · Восточный',   hours: '1 280 м/ч', plate: 'E742КТ 77' },
  { id: 'km-02',  name: 'КамАЗ-65115',              type: 'Самосвал 15 т',         icon: '🚛', status: 'busy',   owner: 'Петров С. М.',      site: 'Объект №2 · Северный',    hours: '96 400 км',  plate: 'В129СО 50' },
  { id: 'bul-03', name: 'Бульдозер Т-170',          type: 'Гусеничный бульдозер',  icon: '🚧', status: 'repair', owner: 'СТО «Механика»',    site: '—',                        hours: '8 920 м/ч', plate: '1438ХС 77' },
  { id: 'kr-04',  name: 'Кран КС-45717',            type: 'Автокран 25 т',         icon: '🏗️', status: 'ok',     owner: 'Сидоров В. П.',     site: 'База №1',                  hours: '44 120 км', plate: 'Т521МК 50' },
];

const statusMap = {
  ok:     { label: 'Свободна',   pill: 'ok',     emoji: '🟢' },
  busy:   { label: 'Занята',     pill: 'busy',   emoji: '🔴' },
  repair: { label: 'На ремонте', pill: 'repair', emoji: '🟡' },
};

const reqStatusMap = {
  new:  { label: 'Новая',     pill: 'new',  emoji: '🔵' },
  work: { label: 'В работе',  pill: 'work', emoji: '🟡' },
  done: { label: 'Выдано',    pill: 'done', emoji: '🟢' },
  rej:  { label: 'Отклонено', pill: 'rej',  emoji: '🔴' },
};

let myRequests = [];

/* ==================== State / routing ==================== */
const navBack = document.getElementById('navBack');
const history = [];

function now() {
  const d = new Date();
  return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
}

function scrollChat() {
  document.getElementById('chat').scrollTop = 9999;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function clearChat() {
  const chat = document.getElementById('chat');
  chat.innerHTML = '';
}

/* ==================== Helpers ==================== */
function meMsg(text) { /* no-op — visual only, not needed in this style */ }

function addCard(html) {
  const chat = document.getElementById('chat');
  const el = document.createElement('div');
  el.className = 'card';
  el.innerHTML = html;
  chat.appendChild(el);
  scrollChat();
  return el;
}

function addBtnGroup(buttons, cls) {
  const chat = document.getElementById('chat');
  const group = document.createElement('div');
  group.className = cls || 'btn-group';
  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'btn' + (b.variant ? ' ' + b.variant : '');
    btn.innerHTML = b.html || escapeHtml(b.label || '');
    btn.addEventListener('click', () => b.onClick && b.onClick(btn));
    group.appendChild(btn);
  });
  chat.appendChild(group);
  scrollChat();
  return group;
}

function stripHtml(s) { const d = document.createElement('div'); d.innerHTML = s; return d.textContent.trim(); }

/* ==================== Navigation ==================== */
function go(screen, pushHistory = true) {
  clearChat();
  if (pushHistory && history[history.length - 1] !== screen) history.push(screen);
  updateBack();
  switch (screen) {
    case 'home':     return renderHome();
    case 'tech':     return renderTech();
    case 'techItem': return null;
    case 'material': return renderMaterial();
    case 'newReq':   return renderNewRequestForm();
    case 'myReqs':   return renderMyRequests();
  }
}

function updateBack() {
  navBack.style.visibility = history.length > 1 ? 'visible' : 'hidden';
}

navBack.addEventListener('click', () => {
  if (history.length > 1) {
    history.pop();
    const prev = history[history.length - 1];
    go(prev, false);
  }
});

/* ==================== Screens ==================== */

/* -------- Home -------- */
function renderHome() {
  addCard(`
    <div class="card-title">👋 Добро пожаловать!</div>
    <div class="card-sub">МВС СТ АУК №1 — выберите раздел</div>
  `);
  addBtnGroup([
    { html: '📦<br><span class="sub">Материал</span>', variant: 'big primary', onClick: () => go('material') },
    { html: '🚜<br><span class="sub">Техника</span>',  variant: 'big',         onClick: () => go('tech') },
  ], 'btn-group-2');
}

/* -------- Tech list -------- */
const techList = [
  'Экск. Погр.',
  'Мини погрузчик',
  'Полноповоротный экс.',
  'Самосвал',
  'Манипулятор',
  'Каток',
  'Асфальтоукладчик',
  'Автогудронатор',
  'Газель г/п',
  'Автокран',
  'Миниэкскаватор',
  'КДМ',
  'МТЗ',
  'Автобус',
];

function renderTech() {
  const listHtml = techList.map((name, i) => `
    <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;
      background:rgba(255,255,255,.03);border-radius:10px;margin-bottom:6px;font-size:14px;color:var(--text);">
      <span style="color:var(--text-dim);font-size:12px;min-width:20px;text-align:right;">${i + 1}.</span>
      <span>${escapeHtml(name)}</span>
    </div>
  `).join('');

  addCard(`
    <div class="card-title">🚜 Техника</div>
    <div class="card-sub" style="margin-bottom:12px;">Всего единиц: <b>${techList.length}</b></div>
    ${listHtml}
  `);

  addBtnGroup([
    { label: '← Назад в меню', variant: 'back', onClick: () => { history.pop(); go('home', false); } },
  ]);
}

/* -------- Tech detail -------- */
function renderTechDetail(id) {
  clearChat();
  history.push('techItem:' + id);
  updateBack();

  const e = equipment.find(x => x.id === id);
  const s = statusMap[e.status];

  addCard(`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
      <div style="width:48px;height:48px;border-radius:12px;background:rgba(63,140,255,.12);
        display:grid;place-items:center;font-size:24px;flex-shrink:0;">${e.icon}</div>
      <div>
        <div style="font-size:16px;font-weight:700;">${escapeHtml(e.name)}</div>
        <div style="font-size:12px;color:var(--text-dim);">${escapeHtml(e.type)}</div>
      </div>
    </div>
    ${[
      ['Статус',         `<span class="pill ${s.pill}"><span class="dot ${s.pill}"></span>${s.label}</span>`],
      ['Ответственный',  escapeHtml(e.owner)],
      ['Объект',         escapeHtml(e.site)],
      ['Наработка',      escapeHtml(e.hours)],
      ['Гос. номер',     escapeHtml(e.plate)],
      ['ID в парке',     '#' + e.id.toUpperCase()],
    ].map(([label, val]) => `
      <div style="display:flex;justify-content:space-between;align-items:center;
        padding:10px 12px;background:rgba(255,255,255,.03);border-radius:10px;font-size:13px;margin-bottom:6px;">
        <span style="color:var(--text-dim);">${label}</span>
        <span style="color:var(--text);font-weight:500;text-align:right;">${val}</span>
      </div>`).join('')}
  `);

  addBtnGroup([
    { label: '✏️ Изменить статус', variant: 'primary', onClick: () => openStatusPicker(e.id) },
    { label: '← Назад',            variant: 'back',    onClick: () => { history.pop(); go('tech', false); } },
  ]);
}

function openStatusPicker(id) {
  addCard(`<div class="card-title">Новый статус</div><div class="card-sub">Выберите значение для этой единицы техники</div>`);
  addBtnGroup([
    { label: '🟢 Свободна',   onClick: () => applyStatus(id, 'ok') },
    { label: '🔴 Занята',     onClick: () => applyStatus(id, 'busy') },
    { label: '🟡 На ремонте', onClick: () => applyStatus(id, 'repair') },
    { label: '✕ Отмена', variant: 'ghost', onClick: () => {
      addCard('Ок, статус не изменён.');
      renderTechDetailKeyboardOnly(id);
    }},
  ]);
}

function applyStatus(id, newStatus) {
  const e = equipment.find(x => x.id === id);
  e.status = newStatus;
  const s = statusMap[newStatus];
  addCard(`
    <div style="display:flex;gap:12px;align-items:center;">

// Адреса подгружаются с сервера в loadOrderLists()

let siteAcHi = -1;

function siteEscHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function siteEscRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

function siteAcSearch(q) {
  const drop = document.getElementById('site-ac-drop');
  if (!drop) return;
  siteAcHi = -1;
  const query = q.trim().toLowerCase();
  const raw   = q.trim();

  // Показываем список только от 2 символов (или если поле пустое — скрываем)
  if (query.length < 2) { drop.classList.remove('open'); return; }

  let matches = siteObjects.filter(function(s) { return s.toLowerCase().includes(query); });

  var rows = matches.map(function(s, i) {
    var hi = s.replace(new RegExp('(' + siteEscRe(query) + ')', 'gi'), '<mark>$1</mark>');
    return '<div class="site-ac-item" data-val="' + siteEscHtml(s) + '"' +
      ' onmousedown="siteAcSelect(\'' + siteEscHtml(s).replace(/'/g,'&#39;') + '\')"' +
      ' onmouseover="siteAcHover(' + i + ')">' + hi + '</div>';
  });

  // Если нет совпадений или введённого нет точно в списке — предлагаем добавить
  var exactMatch = siteObjects.some(function(s) { return s.toLowerCase() === query; });
  if (!exactMatch && raw.length >= 2) {
    rows.push(
      '<div class="site-ac-item" style="color:var(--accent);border-top:1px solid var(--border);"' +
      ' onmousedown="siteAcAdd(\'' + siteEscHtml(raw).replace(/'/g,'&#39;') + '\')">' +
      '+ Добавить «' + siteEscHtml(raw) + '»</div>'
    );
  }

  if (!rows.length) { drop.classList.remove('open'); return; }
  drop.innerHTML = rows.join('');
  drop.classList.add('open');
}

function siteAcAdd(val) {
  if (!siteObjects.includes(val)) {
    siteObjects.push(val);
    fetch('https://comfortable-surprise-production-2bf0.up.railway.app/api/order-sites', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: val})
    }).catch(function(){});
  }
  siteAcSelect(val);
}

function siteAcSelect(val) {
  const el = document.getElementById('f-site');
  if (el) el.value = val;
  const drop = document.getElementById('site-ac-drop');
  if (drop) drop.classList.remove('open');
  siteAcHi = -1;
}

function siteAcHover(i) {
  siteAcHi = i;
  document.querySelectorAll('#site-ac-drop .site-ac-item').forEach((el, j) => el.classList.toggle('hov', j === i));
}

function siteAcKeydown(e) {
  const drop = document.getElementById('site-ac-drop');
  if (!drop) return;
  const items = drop.querySelectorAll('.site-ac-item');
  if (!drop.classList.contains('open')) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    siteAcHi = Math.min(siteAcHi + 1, items.length - 1);
    items.forEach((el, j) => el.classList.toggle('hov', j === siteAcHi));
    if (items[siteAcHi]) items[siteAcHi].scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    siteAcHi = Math.max(siteAcHi - 1, 0);
    items.forEach((el, j) => el.classList.toggle('hov', j === siteAcHi));
    if (items[siteAcHi]) items[siteAcHi].scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (siteAcHi >= 0 && items[siteAcHi]) { items[siteAcHi].dispatchEvent(new MouseEvent('mousedown')); }
    else { drop.classList.remove('open'); }
  } else if (e.key === 'Escape') {
    drop.classList.remove('open');
  }
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.site-ac-wrap')) {
    const drop = document.getElementById('site-ac-drop');
    if (drop) drop.classList.remove('open');
  }
});

function removeMatRow(idx) {
  const wrap = document.getElementById('mat-rows-wrap');
  const row = wrap.querySelector('[data-idx="'+idx+'"]');
  if (row) row.remove();
  updateRemoveBtns();
}

function updateRemoveBtns() {
  const wrap = document.getElementById('mat-rows-wrap');
  if (!wrap) return;
  const rows = wrap.querySelectorAll('.mat-row');
  rows.forEach(r => {
    const btn = r.querySelector('.mat-remove');
    if (btn) btn.style.display = rows.length > 1 ? 'block' : 'none';
  });
}

function collectMatRows() {
  const wrap = document.getElementById('mat-rows-wrap');
  if (!wrap) return [];
  const rows = wrap.querySelectorAll('.mat-row');
  const result = [];
  rows.forEach(row => {
    const name = row.querySelector('.mat-name-input').value.trim();
    const qty  = row.querySelector('.mat-qty-input').value.trim();
    const unit = row.querySelector('.mat-unit-select').value;
    const mat_time = row.querySelector('.mat-time-input').value;
    if (name) result.push({ name, qty: qty || '1', unit, mat_time });
  });
  return result;
}

function matAcSearch(input, idx) {
  var val = input.value.trim().toLowerCase();
  var raw = input.value.trim();
  var drop = document.getElementById('mat-ac-' + idx);
  if (!drop) return;
  if (val.length < 2) { drop.style.display = 'none'; return; }
  var matches = MAT_LIST.filter(function(m) { return m.toLowerCase().indexOf(val) !== -1; });
  var rows = matches.map(function(m) {
    var safe = m.replace(/'/g, "\\'");
    return '<div style="padding:10px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);" onmousedown="pickMatAc(this,\'' + safe + '\')">' + m + '</div>';
  });
  var exactMatch = MAT_LIST.some(function(m) { return m.toLowerCase() === val; });
  if (!exactMatch && raw.length >= 2) {
    var safeRaw = raw.replace(/'/g, "\\'");
    rows.push('<div style="padding:10px 12px;cursor:pointer;font-size:13px;color:var(--accent);border-top:1px solid var(--border);" onmousedown="matAcAdd(this,\'' + safeRaw + '\')">' +
      '+ \u0414\u043e\u0431\u0430\u0432\u0438\u0442\u044c \u00ab' + raw + '\u00bb</div>');
  }
  if (!rows.length) { drop.style.display = 'none'; return; }
  drop.innerHTML = rows.join('');
  drop.style.display = 'block';
}

function pickMatAc(el, val) {
  const row = el.closest('.mat-row');
  if (!row) return;
  const input = row.querySelector('.mat-name-input');
  if (input) input.value = val;
  el.closest('.mat-ac-drop').style.display = 'none';
}

document.addEventListener('click', (e) => {
  document.querySelectorAll('.mat-ac-drop').forEach(drop => {
    if (!e.target.closest('.mat-row')) drop.style.display = 'none';
  });
});

}
