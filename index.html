<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>МВС СТ АУК №1</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0b0d12" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="МВС АУК" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ========= Reset / base ========= */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background:
      radial-gradient(1200px 600px at 20% -10%, #1a2744 0%, transparent 60%),
      radial-gradient(900px 500px at 90% 110%, #2a1a44 0%, transparent 60%),
      #0b0d12;
    color: #e7ecf3;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    display: grid;
    place-items: center;
    padding: 24px 12px;
    min-height: 100vh;
  }

  /* Design tokens inspired by MAX / VK dark */
  :root {
    --bg-app: #0f1116;            /* outer phone bg */
    --bg-chat: #151a22;           /* chat canvas */
    --bg-top: #1a2029;            /* nav bar */
    --bg-bubble-bot: #222a36;     /* incoming bubble */
    --bg-bubble-me:  #2f74ff;     /* outgoing bubble (MAX blue) */
    --bg-card: #1d242f;
    --bg-card-2: #242c39;
    --border: #262f3d;
    --border-soft: #1e2530;
    --text: #eef2f8;
    --text-dim: #8b95a7;
    --text-muted: #6a7386;
    --accent: #3f8cff;            /* MAX primary blue */
    --accent-2: #6aa8ff;
    --accent-ink: #ffffff;
    --ok: #34c759;
    --warn: #ffb020;
    --danger: #ff4d5e;
    --info: #4aa3ff;
    --radius-lg: 22px;
    --radius-md: 16px;
    --radius-sm: 10px;
    --shadow-phone: 0 40px 80px rgba(0,0,0,.55), 0 8px 24px rgba(0,0,0,.35);
  }

  /* ========= Phone frame ========= */
  .phone {
    width: 390px;
    height: 844px;                /* iPhone 14 Pro height */
    background: var(--bg-app);
    border-radius: 44px;
    box-shadow: var(--shadow-phone), inset 0 0 0 1px #1a1f29;
    position: relative;
    overflow: hidden;
    border: 10px solid #0a0c10;
    display: flex;
    flex-direction: column;
  }

  /* Notch */
  .notch {
    position: absolute;
    top: 8px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 28px;
    background: #000;
    border-radius: 18px;
    z-index: 30;
  }

  /* Status bar */
  .statusbar {
    height: 44px;
    padding: 0 24px;
    display: flex;
    align-items: flex-end;
    padding-bottom: 6px;
    justify-content: space-between;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    background: var(--bg-top);
    position: relative;
    z-index: 10;
  }
  .statusbar .time { letter-spacing: 0.2px; }
  .statusbar .icons { display: flex; gap: 6px; align-items: center; }
  .bar-icon { width: 16px; height: 11px; display: inline-block; }

  /* Navigation bar (chat header) */
  .navbar {
    height: 56px;
    padding: 0 12px;
    background: var(--bg-top);
    border-bottom: 1px solid var(--border-soft);
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    z-index: 9;
  }
  .nav-back {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: grid; place-items: center;
    color: var(--accent);
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 22px;
    transition: background .15s;
  }
  .nav-back:hover { background: rgba(63,140,255,.12); }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #3f8cff, #7a5cff);
    display: grid; place-items: center;
    font-weight: 700; font-size: 14px;
    color: #fff;
    box-shadow: 0 2px 8px rgba(63,140,255,.35);
    position: relative;
  }
  .avatar::after {
    content: '';
    position: absolute;
    right: -2px; bottom: -2px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #34c759;
    border: 2px solid var(--bg-top);
  }
  .nav-title {
    flex: 1;
    display: flex;
    flex-direction: column;
    line-height: 1.15;
  }
  .nav-title .name { font-weight: 600; font-size: 15px; color: var(--text); }
  .nav-title .status { font-size: 12px; color: var(--text-dim); }
  .nav-actions { display: flex; gap: 4px; }
  .nav-icon-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: grid; place-items: center;
    color: var(--text-dim);
    background: transparent;
    border: none;
    cursor: pointer;
    transition: background .15s;
  }
  .nav-icon-btn:hover { background: rgba(255,255,255,.05); color: var(--text); }
  .nav-icon-btn svg { width: 20px; height: 20px; }

  /* Chat area */
  .chat {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 16px 12px 12px;
    background:
      radial-gradient(circle at 10% 0%, rgba(63,140,255,.06), transparent 40%),
      radial-gradient(circle at 90% 100%, rgba(122,92,255,.05), transparent 40%),
      var(--bg-chat);
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }
  .chat::-webkit-scrollbar { width: 0; }

  /* Date chip */
  .date-chip {
    align-self: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    background: rgba(255,255,255,.06);
    padding: 4px 10px;
    border-radius: 10px;
    margin: 4px 0 8px;
    letter-spacing: .3px;
  }

  /* Message bubble */
  .msg {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 14.5px;
    line-height: 1.4;
    position: relative;
    animation: slideIn .28s ease-out;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.bot {
    align-self: flex-start;
    background: var(--bg-bubble-bot);
    color: var(--text);
    border-bottom-left-radius: 6px;
  }
  .msg.me {
    align-self: flex-end;
    background: var(--bg-bubble-me);
    color: #fff;
    border-bottom-right-radius: 6px;
  }
  .msg .time {
    font-size: 10.5px;
    color: var(--text-muted);
    margin-top: 4px;
    display: block;
    text-align: right;
  }
  .msg.me .time { color: rgba(255,255,255,.7); }
  .msg .title { font-weight: 600; margin-bottom: 2px; }

  /* Inline bot keyboard — big reply buttons, Telegram/MAX style */
  .kb {
    align-self: stretch;
    display: grid;
    gap: 8px;
    grid-template-columns: 1fr 1fr;
    margin-top: 2px;
  }
  .kb.single { grid-template-columns: 1fr; }
  .kb-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 12px;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: transform .1s ease, background .15s, border-color .15s;
    display: flex; align-items: center; justify-content: center;
    gap: 6px;
    min-height: 48px;
    text-align: center;
  }
  .kb-btn:hover {
    background: var(--bg-card-2);
    border-color: #334055;
  }
  .kb-btn:active { transform: scale(.98); }
  .kb-btn.primary {
    background: linear-gradient(180deg, #3f8cff, #2d74e6);
    border-color: transparent;
    color: #fff;
    font-weight: 600;
    box-shadow: 0 4px 14px rgba(63,140,255,.3);
  }
  .kb-btn.primary:hover { background: linear-gradient(180deg, #4e99ff, #3680ee); }
  .kb-btn.ghost { background: transparent; color: var(--text-dim); }
  .kb-btn.back { color: var(--accent); background: rgba(63,140,255,.08); border-color: rgba(63,140,255,.2); }
  .kb-btn.big  { font-size: 15.5px; font-weight: 600; min-height: 64px; flex-direction: column; gap: 4px; }
  .kb-btn.big .sub { font-size: 11.5px; color: var(--text-dim); font-weight: 500; }

  /* Equipment / request cards inside a bot message */
  .card-stack { display: flex; flex-direction: column; gap: 8px; }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color .15s, background .15s, transform .1s;
    display: flex; align-items: center; gap: 12px;
  }
  .card:hover { border-color: #37455c; background: var(--bg-card-2); }
  .card:active { transform: scale(.99); }
  .card-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: rgba(63,140,255,.1);
    display: grid; place-items: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .card-body { flex: 1; min-width: 0; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .card-sub { font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
  .card-chev { color: var(--text-muted); font-size: 18px; flex-shrink: 0; }

  /* Status dot + pill */
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.ok { background: var(--ok); box-shadow: 0 0 8px rgba(52,199,89,.5); }
  .dot.busy { background: var(--danger); box-shadow: 0 0 8px rgba(255,77,94,.5); }
  .dot.repair { background: var(--warn); box-shadow: 0 0 8px rgba(255,176,32,.5); }
  .dot.new { background: var(--info); }

  .pill {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .pill.ok    { background: rgba(52,199,89,.14); color: #5ad17a; }
  .pill.busy  { background: rgba(255,77,94,.15); color: #ff7985; }
  .pill.repair{ background: rgba(255,176,32,.15); color: #ffc65c; }
  .pill.new   { background: rgba(74,163,255,.15); color: #7ab9ff; }
  .pill.work  { background: rgba(255,176,32,.15); color: #ffc65c; }
