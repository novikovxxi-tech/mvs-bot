<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>МВС СТ АУК №1</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0b0d12" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="МВС АУК" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ========= Reset / base ========= */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background:
      radial-gradient(1200px 600px at 20% -10%, #1a2744 0%, transparent 60%),
      radial-gradient(900px 500px at 90% 110%, #2a1a44 0%, transparent 60%),
      #0b0d12;
    color: #e7ecf3;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    display: grid;
    place-items: center;
    padding: 24px 12px;
    min-height: 100vh;
  }

  /* Design tokens inspired by MAX / VK dark */
  :root {
    --bg-app: #0f1116;            /* outer phone bg */
    --bg-chat: #151a22;           /* chat canvas */
    --bg-top: #1a2029;            /* nav bar */
    --bg-bubble-bot: #222a36;     /* incoming bubble */
    --bg-bubble-me:  #2f74ff;     /* outgoing bubble (MAX blue) */
    --bg-card: #1d242f;
    --bg-card-2: #242c39;
    --border: #262f3d;
    --border-soft: #1e2530;
    --text: #eef2f8;
    --text-dim: #8b95a7;
    --text-muted: #6a7386;
    --accent: #3f8cff;            /* MAX primary blue */
    --accent-2: #6aa8ff;
    --accent-ink: #ffffff;
    --ok: #34c759;
    --warn: #ffb020;
    --danger: #ff4d5e;
    --info: #4aa3ff;
    --radius-lg: 22px;
    --radius-md: 16px;
    --radius-sm: 10px;
    --shadow-phone: 0 40px 80px rgba(0,0,0,.55), 0 8px 24px rgba(0,0,0,.35);
  }

  /* ========= Phone frame ========= */
  .phone {
    width: 390px;
    height: 844px;                /* iPhone 14 Pro height */
    background: var(--bg-app);
    border-radius: 44px;
    box-shadow: var(--shadow-phone), inset 0 0 0 1px #1a1f29;
    position: relative;
    overflow: hidden;
    border: 10px solid #0a0c10;
    display: flex;
    flex-direction: column;
  }

  /* Notch */
  .notch {
    position: absolute;
    top: 8px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 28px;
    background: #000;
    border-radius: 18px;
    z-index: 30;
  }

  /* Status bar */
  .statusbar {
    height: 44px;
    padding: 0 24px;
    display: flex;
    align-items: flex-end;
    padding-bottom: 6px;
    justify-content: space-between;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    background: var(--bg-top);
    position: relative;
    z-index: 10;
  }
  .statusbar .time { letter-spacing: 0.2px; }
  .statusbar .icons { display: flex; gap: 6px; align-items: center; }
  .bar-icon { width: 16px; height: 11px; display: inline-block; }

  /* Navigation bar (chat header) */
  .navbar {
    height: 56px;
    padding: 0 12px;
    background: var(--bg-top);
    border-bottom: 1px solid var(--border-soft);
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    z-index: 9;
  }
  .nav-back {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: grid; place-items: center;
    color: var(--accent);
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 22px;
    transition: background .15s;
  }
  .nav-back:hover { background: rgba(63,140,255,.12); }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #3f8cff, #7a5cff);
    display: grid; place-items: center;
    font-weight: 700; font-size: 14px;
    color: #fff;
    box-shadow: 0 2px 8px rgba(63,140,255,.35);
    position: relative;
  }
  .avatar::after {
    content: '';
    position: absolute;
    right: -2px; bottom: -2px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #34c759;
    border: 2px solid var(--bg-top);
  }
  .nav-title {
    flex: 1;
    display: flex;
    flex-direction: column;
    line-height: 1.15;
  }
  .nav-title .name { font-weight: 600; font-size: 15px; color: var(--text); }
  .nav-title .status { font-size: 12px; color: var(--text-dim); }
  .nav-actions { display: flex; gap: 4px; }
  .nav-icon-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: grid; place-items: center;
    color: var(--text-dim);
    background: transparent;
    border: none;
    cursor: pointer;
    transition: background .15s;
  }
  .nav-icon-btn:hover { background: rgba(255,255,255,.05); color: var(--text); }
  .nav-icon-btn svg { width: 20px; height: 20px; }

  /* Chat area */
  .chat {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 16px 12px 12px;
    background:
      radial-gradient(circle at 10% 0%, rgba(63,140,255,.06), transparent 40%),
      radial-gradient(circle at 90% 100%, rgba(122,92,255,.05), transparent 40%),
      var(--bg-chat);
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }
  .chat::-webkit-scrollbar { width: 0; }

  /* Date chip */
  .date-chip {
    align-self: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    background: rgba(255,255,255,.06);
    padding: 4px 10px;
    border-radius: 10px;
    margin: 4px 0 8px;
    letter-spacing: .3px;
  }

  /* Message bubble */
  .msg {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 14.5px;
    line-height: 1.4;
    position: relative;
    animation: slideIn .28s ease-out;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.bot {
    align-self: flex-start;
    background: var(--bg-bubble-bot);
    color: var(--text);
    border-bottom-left-radius: 6px;
  }
  .msg.me {
    align-self: flex-end;
    background: var(--bg-bubble-me);
    color: #fff;
    border-bottom-right-radius: 6px;
  }
  .msg .time {
    font-size: 10.5px;
    color: var(--text-muted);
    margin-top: 4px;
    display: block;
    text-align: right;
  }
  .msg.me .time { color: rgba(255,255,255,.7); }
  .msg .title { font-weight: 600; margin-bottom: 2px; }

  /* Inline bot keyboard — big reply buttons, Telegram/MAX style */
  .kb {
    align-self: stretch;
    display: grid;
    gap: 8px;
    grid-template-columns: 1fr 1fr;
    margin-top: 2px;
  }
  .kb.single { grid-template-columns: 1fr; }
  .kb-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 12px;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: transform .1s ease, background .15s, border-color .15s;
    display: flex; align-items: center; justify-content: center;
    gap: 6px;
    min-height: 48px;
    text-align: center;
  }
  .kb-btn:hover {
    background: var(--bg-card-2);
    border-color: #334055;
  }
  .kb-btn:active { transform: scale(.98); }
  .kb-btn.primary {
    background: linear-gradient(180deg, #3f8cff, #2d74e6);
    border-color: transparent;
    color: #fff;
    font-weight: 600;
    box-shadow: 0 4px 14px rgba(63,140,255,.3);
  }
  .kb-btn.primary:hover { background: linear-gradient(180deg, #4e99ff, #3680ee); }
  .kb-btn.ghost { background: transparent; color: var(--text-dim); }
  .kb-btn.back { color: var(--accent); background: rgba(63,140,255,.08); border-color: rgba(63,140,255,.2); }
  .kb-btn.big  { font-size: 15.5px; font-weight: 600; min-height: 64px; flex-direction: column; gap: 4px; }
  .kb-btn.big .sub { font-size: 11.5px; color: var(--text-dim); font-weight: 500; }

  /* Equipment / request cards inside a bot message */
  .card-stack { display: flex; flex-direction: column; gap: 8px; }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color .15s, background .15s, transform .1s;
    display: flex; align-items: center; gap: 12px;
  }
  .card:hover { border-color: #37455c; background: var(--bg-card-2); }
  .card:active { transform: scale(.99); }
  .card-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: rgba(63,140,255,.1);
    display: grid; place-items: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .card-body { flex: 1; min-width: 0; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .card-sub { font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
  .card-chev { color: var(--text-muted); font-size: 18px; flex-shrink: 0; }

  /* Status dot + pill */
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.ok { background: var(--ok); box-shadow: 0 0 8px rgba(52,199,89,.5); }
  .dot.busy { background: var(--danger); box-shadow: 0 0 8px rgba(255,77,94,.5); }
  .dot.repair { background: var(--warn); box-shadow: 0 0 8px rgba(255,176,32,.5); }
  .dot.new { background: var(--info); }

  .pill {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .pill.ok    { background: rgba(52,199,89,.14); color: #5ad17a; }
  .pill.busy  { background: rgba(255,77,94,.15); color: #ff7985; }
  .pill.repair{ background: rgba(255,176,32,.15); color: #ffc65c; }
  .pill.new   { background: rgba(74,163,255,.15); color: #7ab9ff; }
  .pill.work  { background: rgba(255,176,32,.15); color: #ffc65c; }
  .pill.done  { background: rgba(52,199,89,.14); color: #5ad17a; }
  .pill.rej   { background: rgba(255,77,94,.15); color: #ff7985; }

  /* Equipment detail card (rich) */
  .detail-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
    min-width: 0;
  }
  .detail-header {
    display: flex; align-items: center; gap: 12px;
  }
  .detail-header .card-icon {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, rgba(63,140,255,.2), rgba(122,92,255,.15));
  }
  .detail-header h3 { margin: 0; font-size: 16px; font-weight: 600; }
  .detail-header .type { font-size: 12px; color: var(--text-dim); }

  .detail-rows { display: flex; flex-direction: column; gap: 8px; }
  .detail-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 12px;
    background: rgba(255,255,255,.03);
    border-radius: 10px;
    font-size: 13px;
  }
  .detail-row .label { color: var(--text-dim); }
  .detail-row .value { color: var(--text); font-weight: 500; text-align: right; }

  /* Form inputs */
  .form {
    display: flex; flex-direction: column; gap: 10px;
    max-width: 100%;
  }
  .form-field label {
    display: block;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .4px;
    margin-bottom: 6px;
    padding-left: 2px;
  }
  .input, .select {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color .15s, background .15s;
  }
  .input:focus, .select:focus {
    border-color: var(--accent);
    background: var(--bg-card-2);
  }
  .input::placeholder { color: var(--text-muted); }
  input[type="date"] { color: var(--text); }
  input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0; position: absolute; right: 0; width: 40px; height: 100%; cursor: pointer; }
  .row-2 { display: grid; grid-template-columns: 1.2fr 1fr; gap: 8px; }
  .select {
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%238b95a7' d='M6 8L0 0h12z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 14px center;
    padding-right: 32px;
  }

  /* Request list item */
  .req-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .req-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .req-title { font-size: 14px; font-weight: 600; }
  .req-meta { font-size: 12px; color: var(--text-dim); display: flex; gap: 8px; flex-wrap: wrap; }
  .req-meta span { display: inline-flex; align-items: center; gap: 4px; }

  /* Success banner */
  .success {
    background: linear-gradient(135deg, rgba(52,199,89,.12), rgba(52,199,89,.05));
    border: 1px solid rgba(52,199,89,.3);
    border-radius: 14px;
    padding: 14px;
    display: flex; gap: 12px; align-items: center;
  }
  .success .tick {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(52,199,89,.2);
    color: #5ad17a;
    display: grid; place-items: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .success .txt { font-size: 13px; line-height: 1.4; }
  .success .txt strong { display: block; font-size: 14px; margin-bottom: 2px; color: #d2f7dd; }

  /* Typing indicator */
  .typing {
    align-self: flex-start;
    background: var(--bg-bubble-bot);
    padding: 12px 14px;
    border-radius: 18px;
    border-bottom-left-radius: 6px;
    display: flex; gap: 4px; align-items: center;
  }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: .5; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* Composer (bottom input — disabled, bot-only feel) */
  .composer {
    padding: 8px 10px 14px;
    background: var(--bg-top);
    border-top: 1px solid var(--border-soft);
    display: flex; align-items: center; gap: 8px;
  }
  .composer .attach, .composer .mic {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: transparent;
    color: var(--text-dim);
    border: none;
    display: grid; place-items: center;
    cursor: pointer;
  }
  .composer .attach:hover, .composer .mic:hover { background: rgba(255,255,255,.05); color: var(--text); }
  .composer .input-fake {
    flex: 1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 9px 14px;
    font-size: 13.5px;
    color: var(--text-muted);
  }

  /* Home indicator */
  .home-indicator {
    position: absolute;
    bottom: 6px; left: 50%;
    transform: translateX(-50%);
    width: 134px; height: 5px;
    border-radius: 3px;
    background: rgba(255,255,255,.35);
    z-index: 20;
  }

  /* Utility */
  .hidden { display: none !important; }
  .caption { font-size: 11.5px; color: var(--text-dim); line-height: 1.3; }

  /* Hint badge outside phone */
  .hint {
    position: fixed;
    top: 16px; left: 16px;
    font-size: 12px;
    color: #8b95a7;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.06);
    padding: 6px 10px;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    letter-spacing: .2px;
  }

  /* ========= Mobile: full-screen mode ========= */
  @media (max-width: 480px) {
    body {
      padding: 0;
      display: block;
      background: var(--bg-app);
    }
    .hint { display: none; }
    .phone {
      width: 100vw;
      height: 100dvh;
      border-radius: 0;
      border: none;
      box-shadow: none;
    }
    .notch { display: none; }
    .statusbar { display: none; }
    .navbar { height: 52px; padding: 0 8px; }
    .chat { padding: 12px 8px 8px; gap: 8px; }
    .msg {
      max-width: 92%;
      font-size: 15px;
      padding: 10px 13px;
    }
    .kb-btn {
      font-size: 15px;
      padding: 16px 12px;
      min-height: 52px;
      border-radius: 16px;
    }
    .kb-btn.big { min-height: 72px; font-size: 16px; }
    .input, .select {
      font-size: 16px; /* prevents iOS zoom */
      padding: 13px 14px;
      border-radius: 14px;
    }
    .form-field label { font-size: 12px; }
    .tech-qty-input { font-size: 16px !important; width: 58px !important; }
    .tech-time-input { font-size: 15px !important; width: 100px !important; }
    .composer { padding: 8px 8px env(safe-area-inset-bottom, 10px); }
    .home-indicator { display: none; }
    .card { padding: 12px; }
    .card-title { font-size: 15px; }
    .detail-row { font-size: 14px; }
  }

  /* ─── SITE AUTOCOMPLETE ─────────────────────────── */
  .site-ac-wrap { position: relative; }
  .site-ac-input {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    padding: 12px 14px;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    transition: border-color .15s, background .15s;
    box-sizing: border-box;
  }
  .site-ac-input:focus { border-color: var(--accent); background: var(--bg-card-2); }
  .site-ac-input::placeholder { color: var(--text-muted); }
  .site-ac-drop {
    position: absolute;
    left: 0; right: 0;
    top: calc(100% + 4px);
    background: var(--bg-card-2);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    z-index: 300;
    max-height: 240px;
    overflow-y: auto;
    box-shadow: 0 8px 28px rgba(0,0,0,.45);
    display: none;
  }
  .site-ac-drop.open { display: block; }
  .site-ac-item {
    padding: 12px 16px;
    font-size: 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    line-height: 1.35;
    transition: background .1s;
  }
  .site-ac-item:last-child { border-bottom: none; }
  .site-ac-item.hov,
  .site-ac-item:active { background: rgba(var(--accent-rgb, 99,102,241), .12); color: var(--accent); }
  .site-ac-item mark { background: none; color: var(--accent); font-weight: 700; }

  /* PASSWORD SCREEN */
  #pw-screen {
    position: fixed; inset: 0; background: #0f1118;
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  #pw-screen.hidden { display: none; }
  .pw-card {
    background: #1a1f2e; border: 1px solid rgba(255,255,255,.08);
    border-radius: 18px; padding: 32px 28px; width: 90%; max-width: 340px;
    display: flex; flex-direction: column; gap: 18px; align-items: center;
  }
  .pw-logo { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -0.5px; text-align: center; }
  .pw-sub { font-size: 13px; color: rgba(255,255,255,.45); text-align: center; }
  .pw-input {
    width: 100%; padding: 13px 16px; border-radius: 10px;
    background: rgba(255,255,255,.06); border: 1.5px solid rgba(255,255,255,.12);
    color: #fff; font-size: 16px; text-align: center;
    letter-spacing: 3px; outline: none;
  }
  .pw-input:focus { border-color: #6366f1; }
  .pw-input.error { border-color: #ef4444; animation: pw-shake .3s; }
  .pw-btn {
    width: 100%; padding: 13px; border-radius: 10px;
    background: #6366f1; color: #fff; font-size: 15px;
    font-weight: 700; border: none; cursor: pointer;
  }
  .pw-err { font-size: 13px; color: #ef4444; min-height: 18px; }
  @keyframes pw-shake {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
  }
</style>
</head>
<body>

<!-- ЭКРАН ПАРОЛЯ -->
<div id="pw-screen">
  <div class="pw-card">

      onkeydown="if(event.key==='Enter')checkPw()" autocomplete="current-password">

    <button class="pw-btn" onclick="checkPw()">Войти</button>

<script>
  (function(){
    var PW = 'mvs2026';
    var KEY = 'mvs_auth';
    if(localStorage.getItem(KEY) === PW){
      document.getElementById('pw-screen').classList.add('hidden');
    }
    window.checkPw = function(){
      var inp = document.getElementById('pw-input');
      var err = document.getElementById('pw-err');
      if(inp.value === PW){
        localStorage.setItem(KEY, PW);
        document.getElementById('pw-screen').classList.add('hidden');
      } else {
        err.textContent = 'Неверный пароль';
        inp.classList.add('error');
        setTimeout(function(){ inp.classList.remove('error'); }, 400);
        inp.value = '';
      }
    };
  })();
</script>

<script>
/* ==================== Data ==================== */
const equipment = [
  { id: 'eks-01', name: 'Экскаватор Komatsu PC200', type: 'Гусеничный экскаватор', icon: '🚜', status: 'ok',     owner: 'Иванов А. В.',      site: 'Объект №4 · Восточный',   hours: '1 280 м/ч', plate: 'E742КТ 77' },

  { id: 'bul-03', name: 'Бульдозер Т-170',          type: 'Гусеничный бульдозер',  icon: '🚧', status: 'repair', owner: 'СТО «Механика»',    site: '—',                        hours: '8 920 м/ч', plate: '1438ХС 77' },
  { id: 'kr-04',  name: 'Кран КС-45717',            type: 'Автокран 25 т',         icon: '🏗️', status: 'ok',     owner: 'Сидоров В. П.',     site: 'База №1',                  hours: '44 120 км', plate: 'Т521МК 50' },
];

const statusMap = {
  ok:     { label: 'Свободна',     pill: 'ok',     emoji: '🟢' },
  busy:   { label: 'Занята',       pill: 'busy',   emoji: '🔴' },
  repair: { label: 'На ремонте',   pill: 'repair', emoji: '🟡' },
};

const reqStatusMap = {
  new:  { label: 'Новая',    pill: 'new',  emoji: '🔵' },
  work: { label: 'В работе', pill: 'work', emoji: '🟡' },
  done: { label: 'Выдано',   pill: 'done', emoji: '🟢' },
  rej:  { label: 'Отклонено',pill: 'rej',  emoji: '🔴' },
};

// Requests stored in memory — persist across all screen transitions within a session
let myRequests = [];

/* ==================== State / routing ==================== */
const chat = document.getElementById('chat');
const navBack = document.getElementById('navBack');
const navStatus = document.getElementById('navStatus');

const history = []; // nav stack of screen ids
let autoscrollTimer;

function now() {
  const d = new Date();
  return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
}

function scrollChat() {
  clearTimeout(autoscrollTimer);
  autoscrollTimer = setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 30);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ==================== Rendering helpers ==================== */
function botMsg(html, opts = {}) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = html + (opts.noTime ? '' : `<span class="time">${now()}</span>`);
  chat.appendChild(div);
  scrollChat();
  return div;
}
function meMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg me';
  div.innerHTML = `${escapeHtml(text)}<span class="time">${now()} ✓✓</span>`;
  chat.appendChild(div);
  scrollChat();
  return div;
}
function keyboard(buttons, layout = 'grid') {
  const kb = document.createElement('div');
  kb.className = 'kb' + (layout === 'single' ? ' single' : '');
  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'kb-btn' + (b.variant ? ' ' + b.variant : '');
    btn.innerHTML = b.html || escapeHtml(b.label || '');
    btn.addEventListener('click', () => {
      if (b.echo !== false) meMsg(b.echoText || stripHtml(b.label || b.html || ''));
      b.onClick && b.onClick(btn);
    });
    kb.appendChild(btn);
  });
  chat.appendChild(kb);
  scrollChat();
  return kb;
}
function stripHtml(s) { const d = document.createElement('div'); d.innerHTML = s; return d.textContent.trim(); }

function dateChip(text) {
  const el = document.createElement('div');
  el.className = 'date-chip';
  el.textContent = text;
  chat.appendChild(el);
}

function typing(duration = 700) {
  return new Promise(resolve => {
    const t = document.createElement('div');
    t.className = 'typing';
    t.innerHTML = '<span></span><span></span><span></span>';
    chat.appendChild(t);
    scrollChat();
    setTimeout(() => { t.remove(); resolve(); }, duration);
  });
}

/* Disable previous interactive keyboards so user can only act on latest */
function freezePrevKeyboards() {
  chat.querySelectorAll('.kb:not(.frozen)').forEach(kb => {
    kb.classList.add('frozen');
    kb.querySelectorAll('button').forEach(b => {
      b.disabled = true;
      b.style.opacity = '.55';
      b.style.pointerEvents = 'none';
    });
  });
  chat.querySelectorAll('.card:not(.frozen)').forEach(c => {
    c.classList.add('frozen');
    c.style.opacity = '.55';
    c.style.pointerEvents = 'none';
  });
}

/* ==================== Screens ==================== */
function go(screen, pushHistory = true) {
  if (pushHistory && history[history.length - 1] !== screen) history.push(screen);
  updateBack();
  freezePrevKeyboards();
  switch (screen) {
    case 'home':      return renderHome();
    case 'tech':      return renderTech();
    case 'techItem':  return null; // handled directly by renderTechDetail
    case 'material':  return renderMaterial();
    case 'newReq':    return renderNewRequestForm();
    case 'myReqs':    return renderMyRequests();
  }
}
function updateBack() {
  navBack.style.visibility = history.length > 1 ? 'visible' : 'hidden';
  navStatus.textContent = history.length > 1 ? 'отвечает мгновенно' : 'в сети';
}
navBack.addEventListener('click', () => {
  if (history.length > 1) {
    history.pop();
    const prev = history[history.length - 1];
    go(prev, false);
  }
});

  keyboard([

    { html: '← Назад',             variant: 'back',    onClick: () => { history.pop(); go('tech', false); }, echoText: '← Назад' },

async function openStatusPicker(id) {
  await typing(400);
  botMsg(`<div class="title">Новый статус</div>Выберите значение для этой единицы техники:`);
  keyboard([
    { html: '🟢 Свободна',     onClick: () => applyStatus(id, 'ok'),     echoText: '🟢 Свободна' },
    { html: '🔴 Занята',       onClick: () => applyStatus(id, 'busy'),   echoText: '🔴 Занята' },
    { html: '🟡 На ремонте',   onClick: () => applyStatus(id, 'repair'), echoText: '🟡 На ремонте' },
    { html: '✕ Отмена',        variant: 'ghost', onClick: async () => { await typing(300); botMsg('Ок, статус не изменён.'); renderTechDetailKeyboardOnly(id); }, echoText: '✕ Отмена' },
  ]);
}

async function applyStatus(id, newStatus) {
  const e = equipment.find(x => x.id === id);
  e.status = newStatus;
  await typing(500);
  const s = statusMap[newStatus];
  botMsg(`<div class="success">
    <div class="tick">✓</div>
    <div class="txt"><strong>Статус обновлён</strong>${e.name} → <span class="pill ${s.pill}"><span class="dot ${s.pill}"></span>${s.label}</span></div>
  </div>`, { noTime: true });
  renderTechDetailKeyboardOnly(id);
}

function renderTechDetailKeyboardOnly(id) {
  keyboard([
    { html: '📄 Открыть карточку', variant: 'primary', onClick: () => renderTechDetail(id), echoText: '📄 Открыть карточку' },
    { html: '← К списку техники',  variant: 'back',    onClick: () => { // jump back to tech list
        // trim history until tech
        while (history.length && history[history.length-1] !== 'tech') history.pop();
        if (!history.includes('tech')) history.push('tech');
        go('tech', false);
      }, echoText: '← К списку техники' },
  ]);
}

let siteAcHi = -1;

function siteEscHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function siteEscRe(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
}

function siteAcSearch(q) {
  const drop = document.getElementById('site-ac-drop');
  siteAcHi = -1;
  const query = q.trim().toLowerCase();

  let matches;
  if (query.length === 0) {
    matches = siteObjects;
  } else {
    matches = siteObjects.filter(s => s.toLowerCase().includes(query));
  }

  if (matches.length === 0) {
    drop.classList.remove('open');
    return;
  }

  drop.innerHTML = matches.map((s, i) => {
    const hi = query
      ? s.replace(new RegExp('(' + siteEscRe(query) + ')', 'gi'), '<mark>$1</mark>')
      : siteEscHtml(s);
    return `<div class="site-ac-item" data-val="${siteEscHtml(s)}"
      onmousedown="siteAcSelect('${siteEscHtml(s).replace(/'/g,'&#39;')}')"
      onmouseover="siteAcHover(${i})">${hi}</div>`;
  }).join('');

  drop.classList.add('open');
}

function siteAcSelect(val) {
  document.getElementById('f-site').value = val;
  document.getElementById('site-ac-drop').classList.remove('open');
  siteAcHi = -1;
}

function siteAcHover(i) {
  siteAcHi = i;
  document.querySelectorAll('#site-ac-drop .site-ac-item').forEach((el, j) =>
    el.classList.toggle('hov', j === i)
  );
}

function siteAcKeydown(e) {
  const drop = document.getElementById('site-ac-drop');
  const items = drop.querySelectorAll('.site-ac-item');
  if (!drop.classList.contains('open')) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    siteAcHi = Math.min(siteAcHi + 1, items.length - 1);
    items.forEach((el, j) => el.classList.toggle('hov', j === siteAcHi));
    if (items[siteAcHi]) items[siteAcHi].scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    siteAcHi = Math.max(siteAcHi - 1, 0);
    items.forEach((el, j) => el.classList.toggle('hov', j === siteAcHi));
    if (items[siteAcHi]) items[siteAcHi].scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (siteAcHi >= 0 && items[siteAcHi]) {
      items[siteAcHi].dispatchEvent(new MouseEvent('mousedown'));
    } else {
      drop.classList.remove('open');
    }
  } else if (e.key === 'Escape') {
    drop.classList.remove('open');
  }
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.site-ac-wrap')) {
    const drop = document.getElementById('site-ac-drop');
    if (drop) drop.classList.remove('open');
  }
});

  { name: 'Сорокин Александр Евгеньевич',    phone: '+7 (965) 346-29-06' },
];

function toggleRespDropdown() {
  const d = document.getElementById('respDropdown');
  if (!d) return;
  if (!d.innerHTML.trim()) {
    d.innerHTML = respList.map((p, i) => `
      <div onclick="pickResp(${i})"
        style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border-soft);transition:background .12s;"
        onmouseover="this.style.background='rgba(63,140,255,.1)'" onmouseout="this.style.background=''"
      >
        <div style="font-size:13.5px;color:var(--text);">${p.name}</div>
        <div style="font-size:11.5px;color:var(--text-muted);">${p.phone}</div>
      </div>`).join('');
  }
  d.style.display = d.style.display === 'none' ? 'block' : 'none';
}
function pickResp(idx) {
  const person = respList[idx];
  const inp = document.getElementById('f-resp');
  const ph  = document.getElementById('f-phone');
  if (inp) inp.value = person.name;
  if (ph)  ph.value  = person.phone;
  const d = document.getElementById('respDropdown');
  if (d) d.style.display = 'none';
}
document.addEventListener('click', (e) => {
  const d = document.getElementById('respDropdown');
  if (!d) return;
  if (!e.target.closest('#f-resp') && !e.target.closest('#respDropdown') && !e.target.closest('[onclick="toggleRespDropdown()"]')) {
    d.style.display = 'none';
  }
});

/* ==================== Material dropdown ==================== */
function toggleMatDropdown() {
  const d = document.getElementById('matDropdown');
  if (!d) return;
  d.style.display = d.style.display === 'none' ? 'block' : 'none';
}
function pickMat(val) {
  const input = document.getElementById('f-name');
  if (input) { input.value = val; input.style.borderColor = ''; }
  const d = document.getElementById('matDropdown');
  if (d) d.style.display = 'none';
}
document.addEventListener('click', (e) => {
  const d = document.getElementById('matDropdown');
  if (!d) return;
  if (!e.target.closest('#f-name') && !e.target.closest('#matDropdown') && !e.target.closest('[onclick="toggleMatDropdown()"]')) {
    d.style.display = 'none';
  }
});
